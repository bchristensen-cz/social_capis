steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_IMAGE}:${SHORT_SHA}
      - -t
      - ${_IMAGE}:latest
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_IMAGE}

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - jobs
      - update
      - ${_JOB_NAME}
      - --image=${_IMAGE}:${SHORT_SHA}
      - --region=${_REGION}
      - --quiet

images:
  - ${_IMAGE}:${SHORT_SHA}
  - ${_IMAGE}:latest

substitutions:
  _IMAGE: us-central1-docker.pkg.dev/${PROJECT_ID}/social-capis/job
  _REGION: us-central1
  _JOB_NAME: social-capis-daily

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1200s
